# Shared Redis instance for vessel services
# Mirrors the postgres/ pattern: named volume, named network, consumers declare external
#
# DB index allocation (Redis supports 16 DBs, 0–15):
#   DB 0 — zammad  (REDIS_URL: redis://redis:6379/0)
#   DB 1 — immich  (REDIS_HOSTNAME=redis, REDIS_DBINDEX=1)
# When adding a new service, claim the next free DB index here.
volumes:
  redis:
    driver: local
    name: redis

networks:
  redis:
    name: redis

services:
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    container_name: redis
    expose:
      - "6379"
    volumes:
      - redis:/data
    networks:
      - redis
    cpus: "0.2"
    mem_limit: "128m"
